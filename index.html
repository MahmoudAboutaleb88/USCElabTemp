<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>USCE Lab Data Loggers</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--c1:#667eea;--c2:#764ba2;--card:#fff;--sh:0 10px 30px rgba(0,0,0,.15);--tx:#333;--sub:#666;--bd:#ddd;--inp:#fff;--sec:#f5f5f5;--lb:#f5f5f5;--li:#fff}
body.dark{--card:#1e1e2e;--sh:0 10px 30px rgba(0,0,0,.5);--tx:#e0e0e0;--sub:#aaa;--bd:#444;--inp:#2a2a3e;--sec:#2a2a3e;--lb:#2a2a3e;--li:#1a1a28}
body{font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh;padding:20px;transition:.3s}
body.dark{background:linear-gradient(135deg,#0f0f1a,#1a1a2e)}

/* TOAST */
#toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(120px);padding:12px 26px;border-radius:50px;font-size:14px;font-weight:700;color:#fff;opacity:0;transition:.4s;z-index:9999;box-shadow:0 6px 24px rgba(0,0,0,.3);white-space:nowrap;pointer-events:none}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.ok{background:linear-gradient(135deg,#4CAF50,#388e3c)}
#toast.err{background:linear-gradient(135deg,#f44336,#c62828)}
#toast.warn{background:linear-gradient(135deg,#ff9800,#e65100)}
#toast.info{background:linear-gradient(135deg,#2196F3,#1565c0)}

/* LOADING OVERLAY */
#loadingOverlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:8000;align-items:center;justify-content:center;flex-direction:column;gap:16px}
#loadingOverlay.show{display:flex}
.spinner{width:56px;height:56px;border:5px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-msg{color:#fff;font-size:16px;font-weight:600}

/* LAYOUT */
.container{max-width:1200px;margin:0 auto}
.header{background:var(--card);border-radius:20px;padding:14px 20px;margin-bottom:18px;box-shadow:var(--sh);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px}
.header h1{color:#667eea;font-size:22px;font-weight:700}
.hbtns{display:flex;gap:7px;flex-wrap:wrap;align-items:center}

/* BUTTONS */
.btn{border:none;padding:9px 15px;border-radius:11px;font-size:13px;font-weight:600;cursor:pointer;transition:.2s;display:inline-flex;align-items:center;gap:5px}
.btn:hover{transform:translateY(-2px);filter:brightness(1.08)}
.btn:active{transform:translateY(0)}
.btn:disabled{opacity:.45;cursor:not-allowed;transform:none}
.bp{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;box-shadow:0 3px 12px rgba(102,126,234,.4)}
.bg{background:linear-gradient(135deg,#4CAF50,#388e3c);color:#fff}
.br{background:linear-gradient(135deg,#f44336,#c62828);color:#fff}
.bo{background:linear-gradient(135deg,#ff9800,#e65100);color:#fff}
.bgy{background:linear-gradient(135deg,#607d8b,#37474f);color:#fff}
.bdk{background:linear-gradient(135deg,#424242,#212121);color:#fff}
.bt{background:linear-gradient(135deg,#009688,#00695c);color:#fff}
.bsm{padding:7px 11px;font-size:12px;border-radius:9px}

/* PILLS */
.pill{display:flex;background:var(--sec);border-radius:10px;overflow:hidden;border:2px solid var(--bd)}
.pill button{padding:6px 12px;border:none;background:transparent;color:var(--sub);font-size:13px;font-weight:700;cursor:pointer;transition:.2s}
.pill button.on{background:#667eea;color:#fff;border-radius:8px}

/* COMPARE BAR */
#compareBar{background:var(--card);border-radius:16px;padding:14px 18px;margin-bottom:16px;box-shadow:var(--sh);display:none;align-items:center;gap:12px;flex-wrap:wrap}
#compareBar.show{display:flex}
#compareBar h3{color:#667eea;font-size:15px;white-space:nowrap}
.chart-wrap{position:relative;height:200px;margin-top:10px}

/* NOTIF BAR */
#notifBar{display:none;background:#fff3cd;border:2px solid #ffc107;border-radius:12px;padding:10px 16px;margin-bottom:12px;font-size:13px;color:#856404;text-align:center}
body.dark #notifBar{background:#3e2f00;border-color:#ffc107;color:#ffe082}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(265px,1fr));gap:16px}

/* DEVICE CARD */
.card{background:var(--card);border-radius:22px;padding:17px;box-shadow:var(--sh);cursor:pointer;transition:.3s;color:var(--tx);position:relative;user-select:none}
.card:hover{transform:translateY(-4px);box-shadow:0 18px 42px rgba(0,0,0,.22)}
.card.alarm{animation:pulse 1s infinite;border:3px solid #f44336}
.card.snoozed{border:3px solid #ff9800;animation:none}
.card.disc{opacity:.62;border:2px dashed #bbb}
.card.dragging{opacity:.4;transform:scale(.97)}
.card.drag-over{border:2px dashed #667eea;background:#f0f4ff}
body.dark .card.drag-over{background:#1a1f3a}
@keyframes pulse{0%,100%{box-shadow:0 0 18px rgba(244,67,54,.55)}50%{box-shadow:0 0 38px rgba(244,67,54,.9)}}

.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:11px}
.card-name{font-size:16px;font-weight:700;color:var(--tx);display:flex;align-items:center;gap:7px}
.dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.don{background:#4CAF50}.doff{background:#9e9e9e}.dalarm{background:#f44336}.dsnooze{background:#ff9800}
.drag-handle{cursor:grab;color:var(--sub);font-size:18px;padding:2px 4px;opacity:.5}
.drag-handle:hover{opacity:1}

.data-box{background:linear-gradient(135deg,#e3f2fd,#bbdefb);border-radius:16px;padding:14px;text-align:center}
body.dark .data-box{background:linear-gradient(135deg,#1a237e33,#0d47a133)}
.big-temp{font-size:36px;font-weight:700;color:#1976d2;line-height:1}
.big-hum{font-size:20px;color:#0288d1;margin:5px 0}
.bat-txt{font-size:12px;color:var(--sub)}

.mini-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;margin-top:9px}
.ms{background:var(--sec);border-radius:9px;padding:5px 3px;text-align:center}
.msv{font-size:12px;font-weight:700;color:var(--tx)}
.msl{font-size:10px;color:var(--sub)}
.alarm-hint{text-align:center;color:#f44336;font-size:11px;font-weight:700;margin-top:5px}
.snooze-hint{text-align:center;color:#ff9800;font-size:11px;font-weight:700;margin-top:5px}
.disc-hint{text-align:center;color:#999;font-size:11px;margin-top:5px}

/* MODAL */
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:1000;padding:18px;overflow-y:auto}
.mc{background:var(--card);max-width:680px;margin:32px auto;border-radius:22px;padding:24px;position:relative;color:var(--tx)}
.mc h2{color:#667eea;margin-bottom:14px;font-size:20px}
.xbtn{position:absolute;top:13px;right:13px;font-size:25px;cursor:pointer;color:#999;background:none;border:none}
[dir=ltr] .xbtn{right:auto;left:13px}
.xbtn:hover{color:var(--tx)}

/* TABS */
.tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.tab{padding:7px 13px;border:2px solid var(--bd);border-radius:10px;background:transparent;color:var(--sub);font-size:12px;font-weight:700;cursor:pointer;transition:.2s}
.tab.on{background:#667eea;color:#fff;border-color:#667eea}
.tc{display:none}.tc.on{display:block}

/* FORM */
.sec{background:var(--sec);border-radius:13px;padding:15px;margin:9px 0}
.sec h3{margin-bottom:9px;color:var(--tx);font-size:14px}
.fg{margin:9px 0}
.fg label{display:block;margin-bottom:5px;font-weight:600;color:var(--tx);font-size:13px}
.fg input,.fg select{width:100%;padding:9px 11px;border:2px solid var(--bd);border-radius:9px;font-size:14px;background:var(--inp);color:var(--tx);transition:.2s}
.fg input:focus,.fg select:focus{outline:none;border-color:#667eea}
.ag{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* LIVE */
.live-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:11px}
.live-box{border-radius:15px;padding:17px;text-align:center}
.lbt{background:linear-gradient(135deg,#e3f2fd,#bbdefb)}
.lbh{background:linear-gradient(135deg,#e8f5e9,#c8e6c9)}
body.dark .lbt{background:linear-gradient(135deg,#1a237e33,#0d47a133)}
body.dark .lbh{background:linear-gradient(135deg,#1b5e2033,#00600033)}
.lv{font-size:34px;font-weight:700}
.lvt{color:#1976d2}.lvh{color:#388e3c}
.ll{font-size:12px;color:var(--sub);margin-top:3px}

/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-top:9px}
.sb{background:var(--card);border-radius:11px;padding:11px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.07)}
.sbv{font-size:19px;font-weight:700;color:#667eea}
.sbl{font-size:11px;color:var(--sub);margin-top:3px}

/* LOG */
.lf{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.lf input,.lf select{flex:1;min-width:85px;padding:7px 9px;border:2px solid var(--bd);border-radius:8px;font-size:12px;background:var(--inp);color:var(--tx)}
.logbox{max-height:240px;overflow-y:auto;background:var(--lb);border-radius:10px;padding:9px}
.le{background:var(--li);padding:7px 10px;margin:4px 0;border-radius:8px;font-family:monospace;font-size:11px;color:var(--tx)}
[dir=rtl] .le{border-right:4px solid #667eea}
[dir=ltr] .le{border-left:4px solid #667eea}
.le.ale{background:#ffebee}
body.dark .le.ale{background:#3e1a1a}
[dir=rtl] .le.ale{border-right-color:#f44336}
[dir=ltr] .le.ale{border-left-color:#f44336}

/* ALARM HISTORY */
.alarm-hist-item{background:var(--li);padding:9px 12px;margin:4px 0;border-radius:9px;border-right:4px solid #f44336;font-size:12px;color:var(--tx)}
[dir=ltr] .alarm-hist-item{border-right:none;border-left:4px solid #f44336}

/* SNOOZE TIMER */
.snooze-bar{background:#fff3cd;border:2px solid #ffc107;border-radius:10px;padding:10px 14px;margin-top:10px;display:flex;align-items:center;justify-content:space-between;gap:10px;font-size:13px;color:#856404}
body.dark .snooze-bar{background:#3e2f00;color:#ffe082}
.snooze-count{font-weight:700;font-size:16px;color:#e65100}

/* EMPTY */
.empty{text-align:center;padding:55px 20px;color:#fff}
.empty h2{font-size:26px;margin-bottom:7px}

/* BACKUP */
.backup-zone{border:2px dashed var(--bd);border-radius:12px;padding:20px;text-align:center;cursor:pointer;transition:.2s;color:var(--sub)}
.backup-zone:hover{border-color:#667eea;color:#667eea}
</style>
</head>
<body>
<div id="toast"></div>

<!-- LOADING OVERLAY -->
<div id="loadingOverlay">
  <div class="spinner"></div>
  <div class="loading-msg" id="loadingMsg">جارٍ الاتصال...</div>
</div>

<div id="notifBar"></div>

<div class="container">
  <div class="header">
    <h1 id="appTitle">📊 USCE Lab Data Loggers</h1>
    <div class="hbtns">
      <div class="pill" id="unitPill">
        <button class="on" onclick="setUnit('C')">°C</button>
        <button onclick="setUnit('F')">°F</button>
      </div>
      <div class="pill" id="langPill">
        <button class="on" onclick="setLang('ar')">عربي</button>
        <button onclick="setLang('en')">EN</button>
      </div>
      <button class="btn bdk" onclick="toggleDark()" id="darkBtn">🌙</button>
      <button class="btn bt" onclick="openCompare()" id="compareBtn" style="display:none"></button>
      <button class="btn bgy" onclick="openBackup()" id="backupBtn"></button>
      <button class="btn bg" id="reconnBtn" style="display:none" onclick="reconnectAll()"></button>
      <button class="btn bp" onclick="openAddModal()" id="addBtn"></button>
    </div>
  </div>

  <!-- COMPARE CHART BAR -->
  <div id="compareBar">
    <h3 id="compareTitle">📊</h3>
    <div style="flex:1;min-width:200px">
      <div class="chart-wrap" style="height:160px"><canvas id="compareChart"></canvas></div>
    </div>
    <button class="btn br bsm" onclick="closeCompare()" id="closeCompareBtn">✕</button>
  </div>

  <div class="grid" id="devGrid"></div>
  <div class="empty" id="emptyState" style="display:none">
    <h2 id="emptyTitle"></h2><p id="emptySub"></p>
  </div>
</div>

<!-- ADD MODAL -->
<div class="modal" id="addModal">
  <div class="mc" style="max-width:460px">
    <button class="xbtn" onclick="closeAddModal()">×</button>
    <h2 id="addTitle"></h2>
    <div id="addTip" style="background:#e3f2fd;padding:12px;border-radius:10px;margin-bottom:13px;font-size:13px"></div>
    <div id="scanState" style="text-align:center;padding:20px;display:none">
      <div style="font-size:42px">🔍</div>
      <h3 id="scanMsg" style="margin-top:8px"></h3>
    </div>
    <div id="nameState" style="display:none">
      <div class="fg"><label id="nameLabel"></label><input type="text" id="newName"></div>
      <button class="btn bg" style="width:100%;margin-top:8px;justify-content:center" onclick="finalizeDevice()" id="addFinalBtn"></button>
    </div>
    <button class="btn bp" style="width:100%;justify-content:center" id="scanBtn" onclick="scanForDevices()"></button>
  </div>
</div>

<!-- DETAIL MODAL -->
<div class="modal" id="detailModal">
  <div class="mc">
    <button class="xbtn" onclick="closeDetail()">×</button>
    <h2 id="detailName"></h2>
    <div class="tabs" id="tabBar"></div>

    <!-- LIVE -->
    <div class="tc" id="tc-live">
      <div id="connStatus" style="display:none;background:#ffebee;padding:12px;border-radius:10px;margin-bottom:11px;text-align:center">
        <div style="font-size:18px;margin-bottom:7px" id="discMsg"></div>
        <button class="btn bg" onclick="connectFromDetail()" id="connBtn"></button>
      </div>
      <div id="snoozeBar" class="snooze-bar" style="display:none">
        <span id="snoozeMsg">🔕</span>
        <span class="snooze-count" id="snoozeCount"></span>
        <button class="btn br bsm" onclick="cancelSnooze()" id="cancelSnoozeBtn"></button>
      </div>
      <div class="live-grid">
        <div class="live-box lbt"><div class="lv lvt" id="dTemp">--</div><div class="ll" id="dTempLbl"></div></div>
        <div class="live-box lbh"><div class="lv lvh" id="dHum">--%</div><div class="ll" id="dHumLbl"></div></div>
      </div>
      <div style="text-align:center;color:var(--sub);font-size:13px;margin-top:8px" id="dBat"></div>
      <div style="text-align:center;font-size:11px;color:#aaa;margin-top:4px" id="dLast"></div>
      <div id="alarmActions" style="display:none;margin-top:12px;display:none">
        <div style="background:#ffebee;border-radius:12px;padding:12px;text-align:center">
          <div style="color:#f44336;font-weight:700;margin-bottom:9px" id="alarmActMsg"></div>
          <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap">
            <button class="btn bo bsm" onclick="snooze(10)" id="snooze10Btn"></button>
            <button class="btn bo bsm" onclick="snooze(30)" id="snooze30Btn"></button>
            <button class="btn br bsm" onclick="snooze(60)" id="snooze60Btn"></button>
          </div>
        </div>
      </div>
    </div>

    <!-- CHART -->
    <div class="tc" id="tc-chart">
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:9px">
        <button class="btn bsm bp" onclick="setChartRange(30)" id="cr30"></button>
        <button class="btn bsm bp" onclick="setChartRange(60)" id="cr60"></button>
        <button class="btn bsm bgy" onclick="setChartRange(0)" id="crAll"></button>
        <button class="btn bsm bt" onclick="exportChartPNG()" id="chartPngBtn"></button>
      </div>
      <div class="chart-wrap"><canvas id="cTemp"></canvas></div>
      <div class="chart-wrap" style="margin-top:12px"><canvas id="cHum"></canvas></div>
    </div>

    <!-- STATS -->
    <div class="tc" id="tc-stats"><div id="statsContent"></div></div>

    <!-- ALARM -->
    <div class="tc" id="tc-alarm">
      <div class="sec">
        <h3 id="alarmTempTitle"></h3>
        <div class="ag">
          <div class="fg"><label id="maxTLabel"></label><input type="number" id="maxT" value="27" step="0.5"></div>
          <div class="fg"><label id="minTLabel"></label><input type="number" id="minT" value="18" step="0.5"></div>
        </div>
        <h3 id="alarmHumTitle" style="margin-top:12px"></h3>
        <div class="ag">
          <div class="fg"><label id="maxHLabel"></label><input type="number" id="maxH" value="70" min="0" max="100"></div>
          <div class="fg"><label id="minHLabel"></label><input type="number" id="minH" value="30" min="0" max="100"></div>
        </div>
        <label style="display:flex;align-items:center;gap:9px;margin-top:12px;cursor:pointer">
          <input type="checkbox" id="alarmChk" checked style="width:17px;height:17px">
          <span id="alarmChkLbl"></span>
        </label>
        <button class="btn bp" style="width:100%;justify-content:center;margin-top:12px" onclick="saveAlarm()" id="saveAlarmBtn"></button>
      </div>
      <!-- ALARM HISTORY -->
      <div class="sec">
        <h3 id="alarmHistTitle"></h3>
        <div class="logbox" id="alarmHistBox" style="max-height:180px"></div>
      </div>
    </div>

    <!-- LOG -->
    <div class="tc" id="tc-log">
      <!-- INTERVAL SETTING -->
      <div class="sec" style="margin-bottom:10px">
        <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
          <label style="font-weight:600;font-size:13px;color:var(--tx)" id="intervalLabel"></label>
          <select id="logInterval" style="padding:7px 10px;border:2px solid var(--bd);border-radius:9px;background:var(--inp);color:var(--tx);font-size:13px">
            <option value="5000" id="int5s"></option>
            <option value="30000" id="int30s"></option>
            <option value="60000" id="int1m" selected></option>
            <option value="300000" id="int5m"></option>
          </select>
        </div>
      </div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px">
        <button class="btn bsm bg" onclick="startLog()" id="startLogBtn"></button>
        <button class="btn bsm br" onclick="stopLog()" id="stopLogBtn"></button>
        <button class="btn bsm bp" onclick="exportCSV()" id="csvBtn"></button>
        <button class="btn bsm bo" onclick="exportPDF()" id="pdfBtn"></button>
        <button class="btn bsm bgy" onclick="clearLog()" id="clearBtn"></button>
      </div>
      <div class="lf">
        <input type="text" id="logSearch" oninput="renderLog()">
        <select id="logFilter" onchange="renderLog()">
          <option value="all" id="fAll"></option>
          <option value="alarm" id="fAlarm"></option>
          <option value="normal" id="fNormal"></option>
        </select>
        <input type="date" id="logDate" onchange="renderLog()">
      </div>
      <div class="logbox" id="logBox"></div>
      <div style="font-size:11px;color:var(--sub);margin-top:4px" id="logCount"></div>
    </div>

    <!-- SETTINGS -->
    <div class="tc" id="tc-settings">
      <div class="sec">
        <h3 id="editNameTitle"></h3>
        <div class="fg"><label id="editNameLabel"></label><input type="text" id="editName"></div>
        <button class="btn bp" style="width:100%;justify-content:center;margin-top:8px" onclick="saveName()" id="saveNameBtn"></button>
      </div>
      <button class="btn br" style="width:100%;justify-content:center;margin-top:9px" onclick="removeDevice()" id="removeBtn"></button>
    </div>
  </div>
</div>

<!-- BACKUP MODAL -->
<div class="modal" id="backupModal">
  <div class="mc" style="max-width:500px">
    <button class="xbtn" onclick="closeBackup()">×</button>
    <h2 id="backupTitle"></h2>
    <div style="display:flex;gap:10px;flex-direction:column;margin-top:12px">
      <button class="btn bp" style="justify-content:center" onclick="doExportBackup()" id="exportBackupBtn"></button>
      <div class="backup-zone" id="backupDropZone" onclick="document.getElementById('backupFile').click()">
        <div style="font-size:36px">📂</div>
        <div id="backupDropMsg" style="margin-top:8px;font-size:14px"></div>
      </div>
      <input type="file" id="backupFile" accept=".json" style="display:none" onchange="doImportBackup(event)">
      <button class="btn bg" style="justify-content:center" onclick="document.getElementById('backupFile').click()" id="importBackupBtn"></button>
    </div>
  </div>
</div>

<script>
/* ═══════════════════════ TRANSLATIONS ═══════════════════════ */
const T={
ar:{
  title:'📊 USCE Lab Data Loggers',addBtn:'➕ إضافة',reconnBtn:'🔄 إعادة اتصال',
  compareBtn:'📊 مقارنة',backupBtn:'💾 Backup',darkOn:'🌙',darkOff:'☀️',
  emptyTitle:'🔌 لا توجد أجهزة',emptySub:'اضغط "إضافة" لتوصيل أول حساس',
  addTitle:'🔍 إضافة جهاز',addTip:'<strong>قبل المسح:</strong> Chrome/Edge + بلوتوث مفعّل + الحساس قريب',
  scanBtn:'🔍 مسح البلوتوث',scanMsg:'جارٍ البحث...',

/* ═══════════════════════ STORAGE ═══════════════════════ */
async function loadDevices(){
  try{
    const r=await window.storage.get('devicesV3');
    if(r){
      devices=JSON.parse(r.value);
      devices.forEach(d=>{
        d.connected=false;d.bleDevice=null;d.server=null;
        d.alarmActive=false;d.alarmType='';d.snoozed=false;
        if(!d.logs)d.logs=[];if(!d.alarmHistory)d.alarmHistory=[];
        if(d.maxH==null)d.maxH=70;if(d.minH==null)d.minH=30;
        if(d.maxT==null)d.maxT=27;if(d.minT==null)d.minT=18;
        if(d.logInterval==null)d.logInterval=60000;
      });
    }
  }catch(e){devices=[];}
  applyLang();render();
}
async function save(){
  const clean=devices.map(({bleDevice,server,loggingInterval,...r})=>r);
  try{await window.storage.set('devicesV3',JSON.stringify(clean));}catch(e){}
}
const $=id=>document.getElementById(id);

/* ═══════════════════════ TOAST ═══════════════════════ */
function toast(msg,type='ok'){
  const el=$('toast');el.textContent=msg;el.className='show '+type;
  clearTimeout(toastTmr);toastTmr=setTimeout(()=>{el.className='';},3200);
}

/* ═══════════════════════ LOADING ═══════════════════════ */
function showLoading(msg){$('loadingOverlay').classList.add('show');$('loadingMsg').textContent=msg;}
function hideLoading(){$('loadingOverlay').classList.remove('show');}

/* ═══════════════════════ DARK/UNIT/LANG ═══════════════════════ */
function toggleDark(){
  dark=!dark;document.body.classList.toggle('dark',dark);
  $('darkBtn').textContent=dark?T[lang].darkOff:T[lang].darkOn;
  if(cTI||cHI)buildCharts();if(cmpI)buildCompareChart();
}
function setUnit(u){
  unit=u;
  $('unitPill').querySelectorAll('button').forEach((b,i)=>b.classList.toggle('on',i===(u==='C'?0:1)));
  render();if(currentId)updateLive();
}
function toDisp(c){return unit==='F'?((c*9/5)+32).toFixed(1)+'°F':c.toFixed(1)+'°C';}
function setLang(l){
  lang=l;document.documentElement.lang=l;document.documentElement.dir=l==='ar'?'rtl':'ltr';
  $('langPill').querySelectorAll('button').forEach((b,i)=>b.classList.toggle('on',i===(l==='ar'?0:1)));
  applyLang();render();if(currentId)updateDetailUI();
}
function applyLang(){
  const t=T[lang];
  $('appTitle').textContent=t.title;$('addBtn').textContent=t.addBtn;
  $('backupBtn').textContent=t.backupBtn;
  $('emptyTitle').textContent=t.emptyTitle;$('emptySub').textContent=t.emptySub;
  if(devices.length>1){$('compareBtn').style.display='inline-flex';$('compareBtn').textContent=t.compareBtn;}
}

/* ═══════════════════════ RENDER CARDS ═══════════════════════ */
function render(){
  const t=T[lang];
  const grid=$('devGrid'),empty=$('emptyState'),rb=$('reconnBtn'),cb=$('compareBtn');
  if(!devices.length){grid.innerHTML='';empty.style.display='block';rb.style.display='none';cb.style.display='none';return;}
  empty.style.display='none';
  rb.style.display=devices.some(d=>!d.connected)?'inline-flex':'none';
  rb.textContent=t.reconnBtn;
  cb.style.display=devices.length>1?'inline-flex':'none';
  cb.textContent=t.compareBtn;

  grid.innerHTML=devices.map((d,i)=>{
    const temps=(d.logs||[]).map(l=>l.t).filter(v=>v!=null);
    const dispT=v=>(unit==='F'?((+v*9/5)+32).toFixed(1):v)+(temps.length?'°':'')+(temps.length?unit:'');
    const minT=temps.length?Math.min(...temps).toFixed(1):'--';
    const maxT=temps.length?Math.max(...temps).toFixed(1):'--';
    const avgT=temps.length?(temps.reduce((a,b)=>a+b,0)/temps.length).toFixed(1):'--';
    const dotCls=d.connected?(d.alarmActive&&!d.snoozed?'dalarm':d.snoozed?'dsnooze':'don'):'doff';
    const cardCls=`card ${d.alarmActive&&!d.snoozed?'alarm':''} ${d.snoozed?'snoozed':''} ${!d.connected?'disc':''}`;
    return `<div class="${cardCls}" draggable="true"
        ondragstart="dragStart(event,${i})" ondragover="dragOver(event,${i})"
        ondragleave="dragLeave(event)" ondrop="dragDrop(event,${i})"
        onclick="openDetail('${d.id}')">
      <div class="card-header">
        <div class="card-name"><span class="dot ${dotCls}"></span>${d.name||'Device'}</div>
        <span class="drag-handle" title="drag">⠿</span>
      </div>
      <div class="data-box">
        <div class="big-temp">${d.temperature!=null?toDisp(d.temperature):'--'}</div>
        <div class="big-hum">💧 ${d.humidity!=null?Math.round(d.humidity)+'%':'--'}</div>
        <div class="bat-txt">${t.batLabel} ${d.battery!=null?Math.round(d.battery)+'%':'--'}</div>
      </div>
      ${d.alarmActive&&!d.snoozed?`<div class="alarm-hint">⚠️ ${getAlarmMsg(d)}</div>`:''}
      ${d.snoozed?`<div class="snooze-hint">🔕 ${t.snoozeMsg}</div>`:''}
      ${!d.connected?`<div class="disc-hint">⚡ ${lang==='ar'?'اضغط للاتصال':'Tap to connect'}</div>`:''}
      <div class="mini-stats">
        <div class="ms"><div class="msv">${dispT(minT)}</div><div class="msl">${t.miniMin}</div></div>
        <div class="ms"><div class="msv">${dispT(avgT)}</div><div class="msl">${t.miniAvg}</div></div>
        <div class="ms"><div class="msv">${dispT(maxT)}</div><div class="msl">${t.miniMax}</div></div>
      </div>
    </div>`;
  }).join('');
}
function getAlarmMsg(d){
  const t=T[lang];
  if(d.alarmType==='temp')return d.temperature>d.maxT?t.alarmTempHigh:t.alarmTempLow;
  if(d.alarmType==='hum')return d.humidity>d.maxH?t.alarmHumHigh:t.alarmHumLow;
  return '⚠️';
}

/* ═══════════════════════ DRAG & DROP ═══════════════════════ */
function dragStart(e,i){dragSrcIdx=i;setTimeout(()=>e.target.classList.add('dragging'),0);}
function dragOver(e,i){e.preventDefault();if(i!==dragSrcIdx)e.currentTarget.classList.add('drag-over');}
function dragLeave(e){e.currentTarget.classList.remove('drag-over');}
async function dragDrop(e,i){
  e.currentTarget.classList.remove('drag-over');
  if(dragSrcIdx===null||dragSrcIdx===i)return;
  const moved=devices.splice(dragSrcIdx,1)[0];
  devices.splice(i,0,moved);dragSrcIdx=null;
  await save();render();
}

/* ═══════════════════════ ADD DEVICE ═══════════════════════ */
function openAddModal(){
  const t=T[lang];$('addTitle').textContent=t.addTitle;$('addTip').innerHTML=t.addTip;
  $('scanBtn').textContent=t.scanBtn;$('nameLabel').textContent=t.nameLabel;
  $('newName').placeholder=t.namePH;$('addFinalBtn').textContent=t.addFinalBtn;
  $('addModal').style.display='block';
}
function closeAddModal(){
  $('addModal').style.display='none';$('scanState').style.display='none';
  $('nameState').style.display='none';$('scanBtn').style.display='block';selectedBLE=null;
}
async function scanForDevices(){
  const t=T[lang];$('scanBtn').style.display='none';$('scanState').style.display='block';$('scanMsg').textContent=t.scanMsg;
  try{
    if(!navigator.bluetooth)throw new Error(lang==='ar'?'Web Bluetooth غير مدعوم':'Web Bluetooth not supported');
    const dev=await navigator.bluetooth.requestDevice({
      filters:[{namePrefix:'LYWSD'},{namePrefix:'MHO-C401'},{namePrefix:'Xiaomi'},{namePrefix:'MJ_HT'},{namePrefix:'ATC'},{namePrefix:'ClearGrass'}],
      optionalServices:[XIAOMI,'battery_service','0000180f-0000-1000-8000-00805f9b34fb']
    });
    if(devices.some(d=>d.bleId===dev.id)){toast(t.toastDupBLE,'err');closeAddModal();return;}
    selectedBLE=dev;$('scanState').style.display='none';$('nameState').style.display='block';
    $('newName').value=dev.name||'Sensor';
  }catch(e){toast('❌ '+e.message,'err');closeAddModal();}
}
async function finalizeDevice(){
  const t=T[lang];const name=$('newName').value.trim();
  if(!name){toast(lang==='ar'?'أدخل اسمًا':'Enter a name','warn');return;}
  if(!selectedBLE){toast(lang==='ar'?'لم يتم الاختيار':'No device selected','err');return;}
  if(devices.some(d=>d.bleId===selectedBLE.id)){toast(t.toastDupBLE,'err');closeAddModal();return;}
  const dev={id:'d'+Date.now(),name,bleId:selectedBLE.id,bleDevice:null,server:null,connected:false,
    temperature:null,humidity:null,battery:null,lastUpdate:null,
    maxT:27,minT:18,maxH:70,minH:30,alarmEnabled:true,alarmActive:false,alarmType:'',
    snoozed:false,logs:[],alarmHistory:[],logging:false,loggingInterval:null,logInterval:60000};
  devices.push(dev);await save();render();closeAddModal();
  await connectDevice(dev.id,selectedBLE);
}

/* ═══════════════════════ BLE ═══════════════════════ */
async function connectDevice(deviceId,bleDevice){
  const dev=devices.find(d=>d.id===deviceId);if(!dev)return;
  showLoading((T[lang].loadingConn||'Connecting to')+' '+dev.name);
  try{
    const server=await bleDevice.gatt.connect();
    dev.server=server;dev.bleDevice=bleDevice;dev.connected=true;
    bleDevice.addEventListener('gattserverdisconnected',()=>{dev.connected=false;render();});
    await startReading(deviceId);render();
  }catch(e){dev.connected=false;toast('❌ '+e.message,'err');}
  hideLoading();
}
async function startReading(deviceId){
  const dev=devices.find(d=>d.id===deviceId);if(!dev||!dev.server)return;
  try{
    const svc=await dev.server.getPrimaryService(XIAOMI);
    const th=await svc.getCharacteristic(TH);
    await th.startNotifications();
    th.addEventListener('characteristicvaluechanged',ev=>parseSensor(deviceId,ev.target.value));
    parseSensor(deviceId,await th.readValue());
    const bat=await svc.getCharacteristic(BAT);
    dev.battery=(await bat.readValue()).getUint8(0);
    setInterval(async()=>{if(dev.connected){try{parseSensor(deviceId,await th.readValue());dev.battery=(await bat.readValue()).getUint8(0);}catch(e){}}},5000);
  }catch(e){console.error(e);}
}
function parseSensor(deviceId,val){
  const dev=devices.find(d=>d.id===deviceId);if(!dev)return;
  dev.temperature=val.getInt16(0,true)/100;dev.humidity=val.getUint8(2);dev.lastUpdate=Date.now();
  checkAlarm(dev);render();
  if(currentId===deviceId&&activeTab==='live')updateLive();
}
function checkAlarm(dev){
  if(!dev.alarmEnabled){dev.alarmActive=false;dev.alarmType='';return;}
  if(dev.snoozed)return;
  const ta=dev.temperature>dev.maxT||dev.temperature<dev.minT;
  const ha=dev.humidity>dev.maxH||dev.humidity<dev.minH;
  const was=dev.alarmActive;dev.alarmActive=ta||ha;
  dev.alarmType=ta?'temp':(ha?'hum':'');
  if(dev.alarmActive&&!was){
    playBeep();sendNotif(dev);
    dev.alarmHistory.unshift({ts:Date.now(),t:dev.temperature,h:dev.humidity,msg:getAlarmMsg(dev)});
    if(dev.alarmHistory.length>50)dev.alarmHistory.pop();
  }
  if(!dev.alarmActive)dev.alarmType='';
}
function playBeep(){
  try{const ctx=new(window.AudioContext||window.webkitAudioContext)();const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.frequency.value=900;o.type='square';g.gain.value=0.22;o.start();setTimeout(()=>o.stop(),550);}catch(e){}
}

/* ═══════════════════════ SNOOZE ═══════════════════════ */
function snooze(minutes){
  const dev=devices.find(d=>d.id===currentId);if(!dev)return;
  dev.snoozed=true;dev.alarmActive=false;dev.alarmType='';
  const ms=minutes*60*1000;
  let remaining=ms;
  if(snoozeTimers[currentId]){clearTimeout(snoozeTimers[currentId].timer);clearInterval(snoozeTimers[currentId].interval);}
  const timer=setTimeout(async()=>{
    dev.snoozed=false;clearInterval(snoozeTimers[currentId]?.interval);
    delete snoozeTimers[currentId];render();
    if(currentId===dev.id)updateLive();
  },ms);
  const interval=setInterval(()=>{
    remaining-=1000;
    const el=$('snoozeCount');
    if(el){const m=Math.floor(remaining/60000),s=Math.floor((remaining%60000)/1000);el.textContent=`${m}:${s.toString().padStart(2,'0')}`;}
    if(remaining<=0)clearInterval(interval);
  },1000);
  snoozeTimers[currentId]={timer,interval,remaining:ms};
  toast(T[lang].toastSnoozed,'info');render();updateLive();
}
function cancelSnooze(){
  const dev=devices.find(d=>d.id===currentId);if(!dev)return;
  dev.snoozed=false;
  if(snoozeTimers[currentId]){clearTimeout(snoozeTimers[currentId].timer);clearInterval(snoozeTimers[currentId].interval);delete snoozeTimers[currentId];}
  toast(T[lang].toastSnoozeCancel,'warn');render();updateLive();
}

/* ═══════════════════════ NOTIFICATIONS ═══════════════════════ */
async function requestNotifPerm(){if('Notification' in window&&Notification.permission==='default')await Notification.requestPermission();}
function sendNotif(dev){
  const msg=T[lang].notifAlarm.replace('{name}',dev.name||'Device')+' — '+getAlarmMsg(dev);
  if('Notification' in window&&Notification.permission==='granted')new Notification('⚠️ USCE Lab',{body:msg});
  const bar=$('notifBar');bar.textContent=msg;bar.style.display='block';
  setTimeout(()=>{bar.style.display='none';},9000);
}

/* ═══════════════════════ RECONNECT ═══════════════════════ */
async function tryReconnect(bleId){
  try{if(!navigator.bluetooth?.getDevices)return null;const l=await navigator.bluetooth.getDevices();return l.find(d=>d.id===bleId)||null;}catch(e){return null;}
}
async function reconnectDevice(deviceId){
  const dev=devices.find(d=>d.id===deviceId);if(!dev)return;
  try{
    let ble=dev.bleId?await tryReconnect(dev.bleId):null;
    if(!ble)ble=await navigator.bluetooth.requestDevice({filters:[{namePrefix:'LYWSD'},{namePrefix:'Xiaomi'},{namePrefix:'ATC'}],optionalServices:[XIAOMI,'0000180f-0000-1000-8000-00805f9b34fb']});
    if(!dev.bleId){dev.bleId=ble.id;await save();}
    await connectDevice(deviceId,ble);
  }catch(e){console.error(e);}
}
async function reconnectAll(){
  const disc=devices.filter(d=>!d.connected);if(!disc.length)return;
  $('reconnBtn').disabled=true;
  for(const d of disc){await reconnectDevice(d.id);await new Promise(r=>setTimeout(r,400));}
  $('reconnBtn').disabled=false;render();
}
async function connectFromDetail(){
  if(!currentId)return;const dev=devices.find(d=>d.id===currentId);if(!dev)return;
  try{
    let ble=dev.bleId?await tryReconnect(dev.bleId):null;
    if(!ble)ble=await navigator.bluetooth.requestDevice({filters:[{namePrefix:'LYWSD'},{namePrefix:'Xiaomi'},{namePrefix:'ATC'}],optionalServices:[XIAOMI,'0000180f-0000-1000-8000-00805f9b34fb']});
    if(!dev.bleId){dev.bleId=ble.id;await save();}
    await connectDevice(currentId,ble);
    $('connStatus').style.display='none';render();updateLive();
  }catch(e){toast('❌ '+e.message,'err');}
}

/* ═══════════════════════ DETAIL MODAL ═══════════════════════ */
function openDetail(deviceId){
  currentId=deviceId;activeTab='live';requestNotifPerm();
  buildTabBar();updateDetailUI();switchTab('live');
  $('detailModal').style.display='block';
}
function closeDetail(){$('detailModal').style.display='none';currentId=null;}
function buildTabBar(){
  const t=T[lang];
  const tabs=[['live',t.tabLive],['chart',t.tabChart],['stats',t.tabStats],['alarm',t.tabAlarm],['log',t.tabLog],['settings',t.tabSettings]];
  $('tabBar').innerHTML=tabs.map(([id,lbl])=>`<button class="tab ${id===activeTab?'on':''}" onclick="switchTab('${id}',event)">${lbl}</button>`).join('');
}
function switchTab(name,ev){
  activeTab=name;
  document.querySelectorAll('.tc').forEach(el=>el.classList.remove('on'));
  document.querySelectorAll('.tab').forEach(el=>el.classList.remove('on'));
  $('tc-'+name).classList.add('on');
  if(ev)ev.target.classList.add('on');
  else{const btns=$('tabBar').querySelectorAll('.tab');['live','chart','stats','alarm','log','settings'].forEach((id,i)=>{if(id===name)btns[i].classList.add('on');});}
  if(name==='chart')buildCharts();if(name==='stats')buildStats();if(name==='log')renderLog();if(name==='alarm')renderAlarmHist();
}
function updateDetailUI(){
  const dev=devices.find(d=>d.id===currentId);if(!dev)return;
  const t=T[lang];
  $('detailName').textContent=dev.name||'Device';
  $('discMsg').textContent=t.discMsg;$('connBtn').textContent=t.connBtn;
  $('connStatus').style.display=dev.connected?'none':'block';
  $('dTempLbl').textContent=t.tempLbl;$('dHumLbl').textContent=t.humLbl;
  $('cr30').textContent=t.cr30;$('cr60').textContent=t.cr60;$('crAll').textContent=t.crAll;
  $('chartPngBtn').textContent=t.chartPngBtn;
  $('alarmTempTitle').textContent=t.alarmTempTitle;$('alarmHumTitle').textContent=t.alarmHumTitle;
  $('maxTLabel').textContent=t.maxTLabel;$('minTLabel').textContent=t.minTLabel;
  $('maxHLabel').textContent=t.maxHLabel;$('minHLabel').textContent=t.minHLabel;
  $('alarmChkLbl').textContent=t.alarmChkLbl;$('saveAlarmBtn').textContent=t.saveAlarmBtn;
  $('alarmHistTitle').textContent=t.alarmHistTitle;
  $('maxT').value=dev.maxT;$('minT').value=dev.minT;$('maxH').value=dev.maxH;$('minH').value=dev.minH;
  $('alarmChk').checked=dev.alarmEnabled;
  $('intervalLabel').textContent=t.intervalLabel;
  $('int5s').textContent=t.int5s;$('int30s').textContent=t.int30s;$('int1m').textContent=t.int1m;$('int5m').textContent=t.int5m;
  $('logInterval').value=dev.logInterval||60000;
  $('startLogBtn').textContent=t.startLogBtn;$('stopLogBtn').textContent=t.stopLogBtn;
  $('csvBtn').textContent=t.csvBtn;$('pdfBtn').textContent=t.pdfBtn;$('clearBtn').textContent=t.clearBtn;
  $('logSearch').placeholder=t.logSearchPH;
  $('fAll').textContent=t.fAll;$('fAlarm').textContent=t.fAlarm;$('fNormal').textContent=t.fNormal;
  $('editNameTitle').textContent=t.editNameTitle;$('editNameLabel').textContent=t.editNameLabel;
  $('saveNameBtn').textContent=t.saveNameBtn;$('removeBtn').textContent=t.removeBtn;
  $('editName').value=dev.name||'';
  $('snooze10Btn').textContent=t.snooze10;$('snooze30Btn').textContent=t.snooze30;$('snooze60Btn').textContent=t.snooze60;
  $('alarmActMsg').textContent=t.alarmActMsg;$('cancelSnoozeBtn').textContent=t.cancelSnoozeBtn;
  updateLive();
}
function updateLive(){
  const dev=devices.find(d=>d.id===currentId);if(!dev)return;
  const t=T[lang];
  $('dTemp').textContent=dev.temperature!=null?toDisp(dev.temperature):'--';
  $('dHum').textContent=dev.humidity!=null?Math.round(dev.humidity)+'%':'--%';
  $('dBat').textContent=t.batLabel+' '+(dev.battery!=null?Math.round(dev.battery)+'%':'--%');
  $('dLast').textContent=dev.lastUpdate?(t.lastUpdate+' '+new Date(dev.lastUpdate).toLocaleTimeString()):'';
  // snooze bar
  const sb=$('snoozeBar'),sn=snoozeTimers[currentId];
  if(dev.snoozed&&sn){sb.style.display='flex';$('snoozeMsg').textContent=t.snoozeMsg;$('cancelSnoozeBtn').textContent=t.cancelSnoozeBtn;}
  else sb.style.display='none';
  // alarm actions
  const aa=$('alarmActions');
  if(dev.alarmActive&&!dev.snoozed){aa.style.display='block';}else aa.style.display='none';
}

/* ═══════════════════════ ALARM ═══════════════════════ */
async function saveAlarm(){
  const dev=devices.find(d=>d.id===currentId);if(!dev)return;
  dev.maxT=parseFloat($('maxT').value);dev.minT=parseFloat($('minT').value);
  dev.maxH=parseFloat($('maxH').value);dev.minH=parseFloat($('minH').value);
  dev.alarmEnabled=$('alarmChk').checked;
  await save();checkAlarm(dev);render();toast(T[lang].toastAlarmSave,'ok');
}
function renderAlarmHist(){
  const dev=devices.find(d=>d.id===currentId);if(!dev)return;
  const hist=dev.alarmHistory||[];
  $('alarmHistBox').innerHTML=hist.length?hist.map(h=>`<div class="alarm-hist-item">
    <strong>${new Date(h.ts).toLocaleString()}</strong><br>
    ${h.msg} — 🌡️${h.t!=null?toDisp(h.t):'--'} 💧${h.h!=null?Math.round(h.h)+'%':'--'}
  </div>`).join(''):`<div style="text-align:center;color:var(--sub);padding:16px">${T[lang].statsEmpty}</div>`;
}

/* ═══════════════════════ STATS ═══════════════════════ */
function buildStats(){
  const dev=devices.find(d=>d.id===currentId);const t=T[lang];
  if(!dev||!dev.logs.length){$('statsContent').innerHTML=`<p style="color:var(--sub);text-align:center;padding:28px">${t.statsEmpty}</p>`;return;}
  const temps=dev.logs.map(l=>l.t).filter(v=>v!=null);
  const hums=dev.logs.map(l=>l.h).filter(v=>v!=null);
  const avg=a=>a.reduce((x,y)=>x+y,0)/a.length;
  const items=temps.length?[
    {l:t.statAvg,v:toDisp(avg(temps))},{l:t.statMin,v:toDisp(Math.min(...temps))},{l:t.statMax,v:toDisp(Math.max(...temps))},
    {l:t.statAvgH,v:avg(hums).toFixed(1)+'%'},{l:t.statMinH,v:Math.min(...hums).toFixed(1)+'%'},{l:t.statMaxH,v:Math.max(...hums).toFixed(1)+'%'},
    {l:t.statCount,v:dev.logs.length+' '+t.readingsLabel},
  ]:[];
  $('statsContent').innerHTML=`<div class="stats-grid">${items.map(i=>`<div class="sb"><div class="sbv">${i.v}</div><div class="sbl">${i.l}</div></div>`).join('')}</div>`;
}

/* ═══════════════════════ CHARTS ═══════════════════════ */
function setChartRange(r){chartRange=r;buildCharts();}
function chartDefaults(){return{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:dark?'#ccc':'#555'}}},scales:{x:{ticks:{color:dark?'#ccc':'#555',maxTicksLimit:7},grid:{color:dark?'rgba(255,255,255,.08)':'rgba(0,0,0,.07)'}},y:{ticks:{color:dark?'#ccc':'#555'},grid:{color:dark?'rgba(255,255,255,.08)':'rgba(0,0,0,.07)'}}}};}
function buildCharts(){
  const dev=devices.find(d=>d.id===currentId);if(!dev)return;
  const t=T[lang];
  let logs=dev.logs||[];if(chartRange>0)logs=logs.slice(-chartRange);
  const labels=logs.map(l=>new Date(l.ts).toLocaleTimeString());
  const temps=logs.map(l=>unit==='F'?+(l.t*9/5+32).toFixed(2):l.t);
  const hums=logs.map(l=>l.h);
  function mk(id,inst,data,lbl,color){
    if(inst)inst.destroy();
    return new Chart($(id).getContext('2d'),{type:'line',data:{labels,datasets:[{label:lbl,data,borderColor:color,backgroundColor:color+'22',tension:.35,pointRadius:2,fill:true}]},options:chartDefaults()});
  }
  cTI=mk('cTemp',cTI,temps,t.chartTempLabel,'#1976d2');
  cHI=mk('cHum',cHI,hums,t.chartHumLabel,'#388e3c');
}
function exportChartPNG(){
  const canvas=$('cTemp');if(!canvas)return;
  const a=document.createElement('a');a.download='temperature_chart.png';a.href=canvas.toDataURL('image/png');a.click();
}

/* ═══════════════════════ COMPARE ═══════════════════════ */
let compareChartOpen=false;
function openCompare(){
  if(devices.length<2){toast(T[lang].noDevices,'warn');return;}
  compareChartOpen=true;
  $('compareBar').classList.add('show');
  $('compareTitle').textContent=T[lang].compareTitle;
  $('closeCompareBtn').textContent=T[lang].closeCompareBtn;
  buildCompareChart();
}
function closeCompare(){compareChartOpen=false;$('compareBar').classList.remove('show');if(cmpI){cmpI.destroy();cmpI=null;}}
function buildCompareChart(){
  if(!compareChartOpen)return;
  if(cmpI){cmpI.destroy();cmpI=null;}
  const colors=['#1976d2','#e53935','#388e3c','#f57c00','#7b1fa2','#00838f'];
  const datasets=devices.map((d,i)=>{
    const logs=(d.logs||[]).slice(-30);
    return{label:d.name||'Device '+(i+1),data:logs.map(l=>unit==='F'?+(l.t*9/5+32).toFixed(2):l.t),borderColor:colors[i%colors.length],backgroundColor:colors[i%colors.length]+'22',tension:.35,pointRadius:2,fill:false};
  });
  const labels=devices.reduce((a,d)=>Math.max(a,(d.logs||[]).length),0);
  const xLabels=Array.from({length:Math.min(labels,30)},(_,i)=>i+1+'');
  cmpI=new Chart($('compareChart').getContext('2d'),{type:'line',data:{labels:xLabels,datasets},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:dark?'#ccc':'#555'}}},scales:{x:{ticks:{color:dark?'#ccc':'#555'}},y:{ticks:{color:dark?'#ccc':'#555'}}}}});
}

/* ═══════════════════════ LOG ═══════════════════════ */
function startLog(){
  const dev=devices.find(d=>d.id===currentId);if(!dev||dev.logging)return;
  const interval=parseInt($('logInterval').value)||60000;dev.logInterval=interval;dev.logging=true;
  dev.loggingInterval=setInterval(async()=>{
    if(dev.temperature==null)return;
    dev.logs.push({ts:Date.now(),t:dev.temperature,h:dev.humidity,b:dev.battery,alarm:dev.alarmActive});
    await save();if(activeTab==='log')renderLog();if(compareChartOpen)buildCompareChart();
  },interval);
  toast(T[lang].toastLogStart,'ok');
}
function stopLog(){
  const dev=devices.find(d=>d.id===currentId);if(!dev)return;
  dev.logging=false;clearInterval(dev.loggingInterval);toast(T[lang].toastLogStop,'warn');
}
async function clearLog(){
  const dev=devices.find(d=>d.id===currentId);if(!dev)return;
  dev.logs=[];await save();renderLog();toast(T[lang].toastLogClear,'info');
}
function renderLog(){
  const dev=devices.find(d=>d.id===currentId);if(!dev){$('logBox').innerHTML='';return;}
  const t=T[lang];
  const search=$('logSearch').value.toLowerCase();
  const filter=$('logFilter').value;
  const dateStr=$('logDate').value;
  let logs=[...dev.logs].reverse();
  if(filter==='alarm')logs=logs.filter(l=>l.alarm);
  if(filter==='normal')logs=logs.filter(l=>!l.alarm);
  if(dateStr)logs=logs.filter(l=>new Date(l.ts).toISOString().startsWith(dateStr));
  if(search)logs=logs.filter(l=>new Date(l.ts).toLocaleString().toLowerCase().includes(search)||String(l.t).includes(search));
  $('logBox').innerHTML=logs.map(l=>`<div class="le ${l.alarm?'ale':''}">
    [${new Date(l.ts).toLocaleString()}] 🌡️${l.t!=null?toDisp(l.t):'--'} 💧${l.h!=null?Math.round(l.h)+'%':'--'} 🔋${Math.round(l.b||0)}%${l.alarm?' ⚠️':''}
  </div>`).join('')||`<div style="text-align:center;color:var(--sub);padding:18px">${t.statsEmpty}</div>`;
  $('logCount').textContent=`${logs.length} / ${dev.logs.length} ${t.readingsLabel}`;
}

/* ═══════════════════════ EXPORT ═══════════════════════ */
function exportCSV(){
  const dev=devices.find(d=>d.id===currentId);if(!dev||!dev.logs.length){toast(T[lang].toastNoData,'warn');return;}
  const rows=dev.logs.map(l=>`${new Date(l.ts).toISOString()},${l.t},${l.h},${l.b||0},${l.alarm}`).join('\n');
  dl('Timestamp,Temperature_C,Humidity_%,Battery_%,Alarm\n'+rows,'text/csv',`${(dev.name||'device').replace(/\s+/g,'_')}_log.csv`);
}
function exportPDF(){
  const dev=devices.find(d=>d.id===currentId);if(!dev||!dev.logs.length){toast(T[lang].toastNoData,'warn');return;}
  const rows=dev.logs.slice(-150).map(l=>`<tr ${l.alarm?'style="background:#ffebee"':''}>
    <td>${new Date(l.ts).toLocaleString()}</td><td>${l.t!=null?toDisp(l.t):'--'}</td>
    <td>${l.h!=null?Math.round(l.h)+'%':'--'}</td><td>${l.b!=null?Math.round(l.b)+'%':'--'}</td><td>${l.alarm?'⚠️':''}</td>
  </tr>`).join('');
  const w=window.open('','_blank');
  w.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${dev.name}</title>
  <style>body{font-family:sans-serif;padding:22px}h1{color:#667eea}table{width:100%;border-collapse:collapse;margin-top:14px}
  th,td{border:1px solid #ddd;padding:7px;font-size:12px}th{background:#667eea;color:#fff}tr:nth-child(even){background:#f9f9f9}</style></head>
  <body><h1>📊 USCE Lab — ${dev.name}</h1><p style="color:#666;font-size:13px">Generated: ${new Date().toLocaleString()} | Readings: ${dev.logs.length}</p>
  <table><thead><tr><th>Timestamp</th><th>Temperature</th><th>Humidity</th><th>Battery</th><th>Alarm</th></tr></thead><tbody>${rows}</tbody></table></body></html>`);
  w.document.close();setTimeout(()=>w.print(),500);
}
function dl(content,mime,filename){
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([content],{type:mime}));a.download=filename;a.click();
}

/* ═══════════════════════ SETTINGS ═══════════════════════ */
async function saveName(){
  const dev=devices.find(d=>d.id===currentId);if(!dev)return;
  const n=$('editName').value.trim();if(!n){toast(lang==='ar'?'أدخل اسمًا':'Enter a name','warn');return;}
  dev.name=n;await save();render();$('detailName').textContent=n;toast(T[lang].toastNameSave,'ok');
}
async function removeDevice(){
  if(!confirm(T[lang].confirmRemove))return;
  devices=devices.filter(d=>d.id!==currentId);await save();render();closeDetail();toast(T[lang].toastRemoved,'info');
}

/* ═══════════════════════ BACKUP ═══════════════════════ */
function openBackup(){
  const t=T[lang];$('backupTitle').textContent=t.backupTitle;$('exportBackupBtn').textContent=t.exportBackupBtn;
  $('importBackupBtn').textContent=t.importBackupBtn;$('backupDropMsg').textContent=t.backupDropMsg;
  $('backupModal').style.display='block';
}
function closeBackup(){$('backupModal').style.display='none';}
function doExportBackup(){
  const clean=devices.map(({bleDevice,server,loggingInterval,...r})=>r);
  dl(JSON.stringify({version:3,exported:new Date().toISOString(),devices:clean},null,2),'application/json',`usce_backup_${Date.now()}.json`);
  toast(T[lang].toastExported,'ok');
}
async function doImportBackup(e){
  const file=e.target.files[0];if(!file)return;
  try{
    const text=await file.text();const data=JSON.parse(text);
    if(!data.devices||!Array.isArray(data.devices))throw new Error('invalid');
    devices=data.devices.map(d=>({...d,connected:false,bleDevice:null,server:null,alarmActive:false,alarmType:'',snoozed:false,logs:d.logs||[],alarmHistory:d.alarmHistory||[]}));
    await save();render();applyLang();closeBackup();toast(T[lang].toastImported,'ok');
  }catch(err){toast(T[lang].toastImportErr,'err');}
  e.target.value='';
}

/* ═══════════════════════ DRAG BACKUP DROP ═══════════════════════ */
const dz=$('backupDropZone');
dz.addEventListener('dragover',e=>{e.preventDefault();dz.style.borderColor='#667eea';});
dz.addEventListener('dragleave',()=>{dz.style.borderColor='';});
dz.addEventListener('drop',e=>{e.preventDefault();dz.style.borderColor='';const f=e.dataTransfer.files[0];if(f)doImportBackup({target:{files:[f],value:''}});});

/* ═══════════════════════ INIT ═══════════════════════ */
loadDevices();
</script>
