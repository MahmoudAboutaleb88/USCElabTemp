<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>USCE Lab Data Loggers</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--card:#fff;--sh:0 10px 30px rgba(0,0,0,.15);--tx:#333;--sub:#666;--bd:#ddd;--inp:#fff;--sec:#f5f5f5;--lb:#f5f5f5;--li:#fff}
body.dark{--card:#1e1e2e;--sh:0 10px 30px rgba(0,0,0,.5);--tx:#e0e0e0;--sub:#aaa;--bd:#444;--inp:#2a2a3e;--sec:#2a2a3e;--lb:#2a2a3e;--li:#1a1a28}
body{font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh;padding:20px;transition:.3s}
body.dark{background:linear-gradient(135deg,#0f0f1a,#1a1a2e)}

#toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(120px);padding:12px 26px;border-radius:50px;font-size:14px;font-weight:700;color:#fff;opacity:0;transition:.4s;z-index:9999;box-shadow:0 6px 24px rgba(0,0,0,.3);white-space:nowrap;pointer-events:none}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.ok{background:linear-gradient(135deg,#4CAF50,#388e3c)}
#toast.err{background:linear-gradient(135deg,#f44336,#c62828)}
#toast.warn{background:linear-gradient(135deg,#ff9800,#e65100)}
#toast.info{background:linear-gradient(135deg,#2196F3,#1565c0)}

#loadingOverlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:8000;align-items:center;justify-content:center;flex-direction:column;gap:16px}
#loadingOverlay.show{display:flex}
.spinner{width:56px;height:56px;border:5px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-msg{color:#fff;font-size:16px;font-weight:600}

.container{max-width:1200px;margin:0 auto}
.header{background:var(--card);border-radius:20px;padding:14px 20px;margin-bottom:18px;box-shadow:var(--sh);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px}
.header h1{color:#667eea;font-size:22px;font-weight:700}
.hbtns{display:flex;gap:7px;flex-wrap:wrap;align-items:center}

#simBanner{background:linear-gradient(135deg,#ff9800,#e65100);color:#fff;border-radius:14px;padding:10px 18px;margin-bottom:14px;display:none;align-items:center;justify-content:space-between;gap:10px;font-size:13px;font-weight:700;box-shadow:0 4px 16px rgba(255,152,0,.4)}
#simBanner.show{display:flex}
.sim-pulse{width:10px;height:10px;border-radius:50%;background:#fff;animation:simpulse 1s infinite}
@keyframes simpulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.4)}}

.btn{border:none;padding:9px 15px;border-radius:11px;font-size:13px;font-weight:600;cursor:pointer;transition:.2s;display:inline-flex;align-items:center;gap:5px}
.btn:hover{transform:translateY(-2px);filter:brightness(1.08)}
.btn:active{transform:translateY(0)}
.btn:disabled{opacity:.45;cursor:not-allowed;transform:none}
.bp{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;box-shadow:0 3px 12px rgba(102,126,234,.4)}
.bg{background:linear-gradient(135deg,#4CAF50,#388e3c);color:#fff}
.br{background:linear-gradient(135deg,#f44336,#c62828);color:#fff}
.bo{background:linear-gradient(135deg,#ff9800,#e65100);color:#fff}
.bgy{background:linear-gradient(135deg,#607d8b,#37474f);color:#fff}
.bdk{background:linear-gradient(135deg,#424242,#212121);color:#fff}
.bt{background:linear-gradient(135deg,#009688,#00695c);color:#fff}
.bsh{background:linear-gradient(135deg,#0f9d58,#0b7d47);color:#fff}
.bsm{padding:7px 11px;font-size:12px;border-radius:9px}

.pill{display:flex;background:var(--sec);border-radius:10px;overflow:hidden;border:2px solid var(--bd)}
.pill button{padding:6px 12px;border:none;background:transparent;color:var(--sub);font-size:13px;font-weight:700;cursor:pointer;transition:.2s}
.pill button.on{background:#667eea;color:#fff;border-radius:8px}

#compareBar{background:var(--card);border-radius:16px;padding:14px 18px;margin-bottom:16px;box-shadow:var(--sh);display:none;flex-direction:column;gap:10px}
#compareBar.show{display:flex}
.cmp-header{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
#compareBar h3{color:#667eea;font-size:15px}
.chart-wrap{position:relative;height:200px;margin-top:10px}

#notifBar{display:none;background:#fff3cd;border:2px solid #ffc107;border-radius:12px;padding:10px 16px;margin-bottom:12px;font-size:13px;color:#856404;text-align:center}
body.dark #notifBar{background:#3e2f00;border-color:#ffc107;color:#ffe082}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:16px}

.card{border-radius:22px;padding:17px;box-shadow:var(--sh);cursor:pointer;transition:.3s;color:var(--tx);position:relative;user-select:none;border:2px solid transparent}
.card:hover{transform:translateY(-4px);box-shadow:0 18px 42px rgba(0,0,0,.22)}
.card.alarm{animation:pulse 1s infinite;border-color:#f44336!important}
.card.snoozed{border-color:#ff9800!important;animation:none}
.card.disc{opacity:.65;border:2px dashed #bbb!important}
.card.sim-card{border-color:#ff9800!important}
.card.dragging{opacity:.4;transform:scale(.97)}
.card.drag-over{border:2px dashed #667eea!important}
@keyframes pulse{0%,100%{box-shadow:0 0 18px rgba(244,67,54,.55)}50%{box-shadow:0 0 38px rgba(244,67,54,.9)}}
.card.temp-cold{background:linear-gradient(160deg,#e3f2fd 0%,var(--card) 60%)}
.card.temp-cool{background:linear-gradient(160deg,#e8f5e9 0%,var(--card) 60%)}
.card.temp-warm{background:linear-gradient(160deg,#fff8e1 0%,var(--card) 60%)}
.card.temp-hot{background:linear-gradient(160deg,#ffebee 0%,var(--card) 60%)}
.card.temp-normal{background:var(--card)}
body.dark .card.temp-cold{background:linear-gradient(160deg,#1a237e22 0%,var(--card) 60%)}
body.dark .card.temp-cool{background:linear-gradient(160deg,#1b5e2022 0%,var(--card) 60%)}
body.dark .card.temp-warm{background:linear-gradient(160deg,#f57f1722 0%,var(--card) 60%)}
body.dark .card.temp-hot{background:linear-gradient(160deg,#b71c1c22 0%,var(--card) 60%)}

.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:11px}
.card-name{font-size:16px;font-weight:700;color:var(--tx);display:flex;align-items:center;gap:7px}
.dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.don{background:#4CAF50}.doff{background:#9e9e9e}.dalarm{background:#f44336}.dsnooze{background:#ff9800}.dsim{background:#ff9800}
.drag-handle{cursor:grab;color:var(--sub);font-size:18px;padding:2px 4px;opacity:.45}
.drag-handle:hover{opacity:1}

.data-box{border-radius:16px;padding:14px;text-align:center}
.db-cold{background:linear-gradient(135deg,#bbdefb,#90caf9)}
.db-cool{background:linear-gradient(135deg,#c8e6c9,#a5d6a7)}
.db-normal{background:linear-gradient(135deg,#e3f2fd,#bbdefb)}
.db-warm{background:linear-gradient(135deg,#fff9c4,#fff176)}
.db-hot{background:linear-gradient(135deg,#ffccbc,#ff8a65)}
body.dark .data-box{background:linear-gradient(135deg,#1a237e33,#0d47a133)!important}
.big-temp{font-size:36px;font-weight:700;line-height:1}
.big-hum{font-size:20px;margin:5px 0}
.bat-txt{font-size:12px;color:var(--sub);display:flex;align-items:center;justify-content:center;gap:5px;margin-top:3px}
.bat-bar{width:40px;height:8px;background:#ddd;border-radius:4px;overflow:hidden;display:inline-block}
.bat-fill{height:100%;border-radius:4px;transition:.4s}
.bat-ok{background:#4CAF50}.bat-mid{background:#ff9800}.bat-low{background:#f44336;animation:batblink .8s infinite}
@keyframes batblink{0%,100%{opacity:1}50%{opacity:.4}}

.mini-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;margin-top:9px}
.ms{background:rgba(0,0,0,.05);border-radius:9px;padding:5px 3px;text-align:center}
body.dark .ms{background:rgba(255,255,255,.07)}
.msv{font-size:12px;font-weight:700;color:var(--tx)}
.msl{font-size:10px;color:var(--sub)}
.alarm-hint{text-align:center;color:#f44336;font-size:11px;font-weight:700;margin-top:5px}
.snooze-hint{text-align:center;color:#ff9800;font-size:11px;font-weight:700;margin-top:5px}
.disc-hint{text-align:center;color:#999;font-size:11px;margin-top:5px}
.last-seen{text-align:center;font-size:10px;color:var(--sub);margin-top:4px}
.bat-warn{text-align:center;font-size:11px;color:#f44336;font-weight:700;margin-top:4px;animation:batblink .8s infinite}

/* Limit lines legend */
.limit-legend{display:flex;gap:12px;flex-wrap:wrap;align-items:center;margin-top:6px;padding:6px 10px;background:var(--sec);border-radius:9px;font-size:11px}
.ll-item{display:flex;align-items:center;gap:5px;color:var(--tx);font-weight:600}
.ll-dot{width:22px;height:3px;border-radius:2px}

.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:1000;padding:18px;overflow-y:auto}
.mc{background:var(--card);max-width:680px;margin:32px auto;border-radius:22px;padding:24px;position:relative;color:var(--tx)}
.mc h2{color:#667eea;margin-bottom:14px;font-size:20px}
.xbtn{position:absolute;top:13px;right:13px;font-size:25px;cursor:pointer;color:#999;background:none;border:none}
[dir=ltr] .xbtn{right:auto;left:13px}
.xbtn:hover{color:var(--tx)}

.tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.tab{padding:7px 13px;border:2px solid var(--bd);border-radius:10px;background:transparent;color:var(--sub);font-size:12px;font-weight:700;cursor:pointer;transition:.2s}
.tab.on{background:#667eea;color:#fff;border-color:#667eea}
.tc{display:none}.tc.on{display:block}

.sec{background:var(--sec);border-radius:13px;padding:15px;margin:9px 0}
.sec h3{margin-bottom:9px;color:var(--tx);font-size:14px}
.fg{margin:9px 0}
.fg label{display:block;margin-bottom:5px;font-weight:600;color:var(--tx);font-size:13px}
.fg input,.fg select,.fg textarea{width:100%;padding:9px 11px;border:2px solid var(--bd);border-radius:9px;font-size:14px;background:var(--inp);color:var(--tx);transition:.2s;font-family:inherit}
.fg input:focus,.fg select:focus,.fg textarea:focus{outline:none;border-color:#667eea}
.ag{display:grid;grid-template-columns:1fr 1fr;gap:10px}

.live-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:11px}
.live-box{border-radius:15px;padding:17px;text-align:center}
.lbt{background:linear-gradient(135deg,#e3f2fd,#bbdefb)}
.lbh{background:linear-gradient(135deg,#e8f5e9,#c8e6c9)}
body.dark .lbt{background:linear-gradient(135deg,#1a237e33,#0d47a133)}
body.dark .lbh{background:linear-gradient(135deg,#1b5e2033,#00600033)}
.lv{font-size:34px;font-weight:700}
.lvt{color:#1976d2}.lvh{color:#388e3c}
.ll{font-size:12px;color:var(--sub);margin-top:3px}

.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-top:9px}
.sb{background:var(--card);border-radius:11px;padding:11px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.07)}
.sbv{font-size:19px;font-weight:700;color:#667eea}
.sbl{font-size:11px;color:var(--sub);margin-top:3px}
.period-tabs{display:flex;gap:6px;margin-bottom:12px}
.ptab{padding:6px 14px;border:2px solid var(--bd);border-radius:9px;background:transparent;color:var(--sub);font-size:12px;font-weight:700;cursor:pointer;transition:.2s}
.ptab.on{background:#667eea;color:#fff;border-color:#667eea}

.lf{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.lf input,.lf select{flex:1;min-width:85px;padding:7px 9px;border:2px solid var(--bd);border-radius:8px;font-size:12px;background:var(--inp);color:var(--tx)}
.logbox{max-height:240px;overflow-y:auto;background:var(--lb);border-radius:10px;padding:9px}
.le{background:var(--li);padding:7px 10px;margin:4px 0;border-radius:8px;font-family:monospace;font-size:11px;color:var(--tx);position:relative}
[dir=rtl] .le{border-right:4px solid #667eea}
[dir=ltr] .le{border-left:4px solid #667eea}
.le.ale{background:#ffebee}
body.dark .le.ale{background:#3e1a1a}
[dir=rtl] .le.ale{border-right-color:#f44336}
[dir=ltr] .le.ale{border-left-color:#f44336}
.le-note{font-style:italic;color:#667eea;font-size:10px;margin-top:3px}
.add-note-btn{position:absolute;top:6px;right:6px;background:none;border:1px solid var(--bd);border-radius:6px;color:var(--sub);font-size:10px;padding:2px 6px;cursor:pointer}
[dir=ltr] .add-note-btn{right:auto;left:6px}
.add-note-btn:hover{border-color:#667eea;color:#667eea}

.alarm-hist-item{background:var(--li);padding:9px 12px;margin:4px 0;border-radius:9px;border-right:4px solid #f44336;font-size:12px;color:var(--tx)}
[dir=ltr] .alarm-hist-item{border-right:none;border-left:4px solid #f44336}

.snooze-bar{background:#fff3cd;border:2px solid #ffc107;border-radius:10px;padding:10px 14px;margin-top:10px;display:flex;align-items:center;justify-content:space-between;gap:10px;font-size:13px;color:#856404}
body.dark .snooze-bar{background:#3e2f00;color:#ffe082}
.snooze-count{font-weight:700;font-size:16px;color:#e65100}

#fullChartModal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:9000;padding:24px;flex-direction:column;gap:14px}
#fullChartModal.show{display:flex}
.fc-header{display:flex;justify-content:space-between;align-items:center;color:#fff}
.fc-header h3{font-size:18px}
.fc-body{flex:1;display:grid;grid-template-rows:1fr 1fr;gap:14px;min-height:0}
.fc-chart{position:relative;background:rgba(255,255,255,.05);border-radius:16px;padding:14px}

/* Google Sheets upload status */
.sheets-status{background:linear-gradient(135deg,#e8f5e9,#c8e6c9);border-radius:10px;padding:10px 14px;margin-top:10px;font-size:12px;color:#1b5e20;display:none}
.sheets-status.show{display:block}

.sound-options{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.sound-opt{padding:8px 14px;border:2px solid var(--bd);border-radius:10px;cursor:pointer;font-size:13px;background:transparent;color:var(--tx);transition:.2s}
.sound-opt.on{border-color:#667eea;background:#667eea22;color:#667eea;font-weight:700}

.empty{text-align:center;padding:55px 20px;color:#fff}
.empty h2{font-size:26px;margin-bottom:7px}
.backup-zone{border:2px dashed var(--bd);border-radius:12px;padding:20px;text-align:center;cursor:pointer;transition:.2s;color:var(--sub)}
.backup-zone:hover{border-color:#667eea;color:#667eea}
</style>
</head>
<body>
<div id="toast"></div>
<div id="loadingOverlay"><div class="spinner"></div><div class="loading-msg" id="loadingMsg"></div></div>
<div id="notifBar"></div>
<div id="simBanner">
  <div style="display:flex;align-items:center;gap:10px"><div class="sim-pulse"></div><span id="simBannerMsg"></span></div>
  <button class="btn bdk bsm" onclick="stopSimulation()" id="stopSimBtn"></button>
</div>

<div class="container">
  <div class="header">
    <h1 id="appTitle">📊 USCE Lab Data Loggers</h1>
    <div class="hbtns">
      <div class="pill" id="unitPill"><button class="on" onclick="setUnit('C')">°C</button><button onclick="setUnit('F')">°F</button></div>
      <div class="pill" id="langPill"><button class="on" onclick="setLang('ar')">عربي</button><button onclick="setLang('en')">EN</button></div>
      <button class="btn bdk" onclick="toggleDark()" id="darkBtn">🌙</button>
      <button class="btn bo" onclick="startSimulation()" id="simBtn"></button>
      <button class="btn bt" onclick="openCompare()" id="compareBtn" style="display:none"></button>
      <button class="btn bgy" onclick="openBackup()" id="backupBtn"></button>
      <button class="btn bg" id="reconnBtn" style="display:none" onclick="reconnectAll()"></button>
      <button class="btn bp" onclick="openAddModal()" id="addBtn"></button>
    </div>
  </div>

  <div id="compareBar">
    <div class="cmp-header">
      <h3 id="compareTitle"></h3>
      <div style="display:flex;gap:7px;align-items:center;flex-wrap:wrap">
        <div class="pill" id="cmpTypePill"><button class="on" onclick="setCmpType('temp')">🌡️</button><button onclick="setCmpType('hum')">💧</button></div>
        <button class="btn bsm bo" onclick="refreshCompare()" id="refreshCmpBtn"></button>
        <button class="btn bsm br" onclick="closeCompare()" id="closeCompareBtn"></button>
      </div>
    </div>
    <div><div class="chart-wrap" style="height:170px"><canvas id="compareChart"></canvas></div></div>
  </div>

  <div class="grid" id="devGrid"></div>
  <div class="empty" id="emptyState" style="display:none"><h2 id="emptyTitle"></h2><p id="emptySub"></p></div>
</div>

<!-- ADD MODAL -->
<div class="modal" id="addModal">
  <div class="mc" style="max-width:460px">
    <button class="xbtn" onclick="closeAddModal()">×</button>
    <h2 id="addTitle"></h2>
    <div id="addTip" style="background:#e3f2fd;padding:12px;border-radius:10px;margin-bottom:13px;font-size:13px"></div>
    <div id="scanState" style="text-align:center;padding:20px;display:none"><div style="font-size:42px">🔍</div><h3 id="scanMsg" style="margin-top:8px"></h3></div>
    <div id="nameState" style="display:none">
      <div class="fg"><label id="nameLabel"></label><input type="text" id="newName"></div>
      <button class="btn bg" style="width:100%;margin-top:8px;justify-content:center" onclick="finalizeDevice()" id="addFinalBtn"></button>
    </div>
    <button class="btn bp" style="width:100%;justify-content:center" id="scanBtn" onclick="scanForDevices()"></button>
  </div>
</div>

<!-- DETAIL MODAL -->
<div class="modal" id="detailModal">
  <div class="mc">
    <button class="xbtn" onclick="closeDetail()">×</button>
    <h2 id="detailName"></h2>
    <div class="tabs" id="tabBar"></div>

    <!-- TAB: LIVE -->
    <div class="tc" id="tc-live">
      <div id="connStatus" style="display:none;background:#ffebee;padding:12px;border-radius:10px;margin-bottom:11px;text-align:center">
        <div style="font-size:18px;margin-bottom:7px" id="discMsg"></div>
        <button class="btn bg" onclick="connectFromDetail()" id="connBtn"></button>
      </div>
      <div id="snoozeBar" class="snooze-bar" style="display:none">
        <span id="snoozeMsg"></span><span class="snooze-count" id="snoozeCount"></span>
        <button class="btn br bsm" onclick="cancelSnooze()" id="cancelSnoozeBtn"></button>
      </div>
      <div class="live-grid">
        <div class="live-box lbt"><div class="lv lvt" id="dTemp">--</div><div class="ll" id="dTempLbl"></div></div>
        <div class="live-box lbh"><div class="lv lvh" id="dHum">--%</div><div class="ll" id="dHumLbl"></div></div>
      </div>
      <div style="text-align:center;font-size:13px;margin-top:8px" id="dBat"></div>
      <div style="text-align:center;font-size:11px;color:#aaa;margin-top:4px" id="dLast"></div>
      <div id="alarmActions" style="display:none;margin-top:12px">
        <div style="background:#ffebee;border-radius:12px;padding:12px;text-align:center">
          <div style="color:#f44336;font-weight:700;margin-bottom:9px" id="alarmActMsg"></div>
          <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap">
            <button class="btn bo bsm" onclick="snooze(10)" id="snooze10Btn"></button>
            <button class="btn bo bsm" onclick="snooze(30)" id="snooze30Btn"></button>
            <button class="btn br bsm" onclick="snooze(60)" id="snooze60Btn"></button>
          </div>
        </div>
      </div>
    </div>

    <!-- TAB: CHART -->
    <div class="tc" id="tc-chart">
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:9px;align-items:center">
        <button class="btn bsm bp" onclick="setChartRange(30)" id="cr30"></button>
        <button class="btn bsm bp" onclick="setChartRange(60)" id="cr60"></button>
        <button class="btn bsm bgy" onclick="setChartRange(0)" id="crAll"></button>
        <button class="btn bsm bt" onclick="exportChartPNG()" id="chartPngBtn"></button>
        <button class="btn bsm bdk" onclick="openFullChart()" id="fullscreenBtn"></button>
      </div>
      <!-- Temperature Chart -->
      <div class="chart-wrap"><canvas id="cTemp"></canvas></div>
      <div class="limit-legend" id="tempLimitLegend">
        <span class="ll-item"><span class="ll-dot" style="background:#f44336"></span><span id="llMaxT"></span></span>
        <span class="ll-item"><span class="ll-dot" style="background:#2196F3"></span><span id="llMinT"></span></span>
        <span class="ll-item"><span class="ll-dot" style="background:#1976d2;height:2px;width:22px;opacity:.6"></span><span id="llTempLine"></span></span>
      </div>
      <!-- Humidity Chart -->
      <div class="chart-wrap" style="margin-top:12px"><canvas id="cHum"></canvas></div>
      <div class="limit-legend" id="humLimitLegend">
        <span class="ll-item"><span class="ll-dot" style="background:#e91e63"></span><span id="llMaxH"></span></span>
        <span class="ll-item"><span class="ll-dot" style="background:#00bcd4"></span><span id="llMinH"></span></span>

function loadDevices(){
  try{
    const raw=localStorage.getItem('usce_devicesV5');
    if(raw){
      devices=JSON.parse(raw);
      devices.forEach(d=>{
        d.connected=false;d.bleDevice=null;d.server=null;
        d.alarmActive=false;d.alarmType='';d.snoozed=false;
        d.logging=false;d.loggingInterval=null;
        if(!d.logs)d.logs=[];
        if(!d.alarmHistory)d.alarmHistory=[];
        if(d.maxH==null)d.maxH=70;if(d.minH==null)d.minH=30;
        if(d.maxT==null)d.maxT=27;if(d.minT==null)d.minT=18;
        if(!d.logInterval)d.logInterval=60000;
        if(!d.sound)d.sound='beep';
      });
    }
  }catch(e){devices=[];}
  // Restore preferences
  try{
    const prefs=JSON.parse(localStorage.getItem('usce_prefs')||'{}');
    if(prefs.dark){dark=true;document.body.classList.add('dark');}
    if(prefs.lang){
      lang=prefs.lang;
      document.documentElement.lang=lang;
      document.documentElement.dir=lang==='ar'?'rtl':'ltr';
      $('langPill').querySelectorAll('button').forEach((b,i)=>b.classList.toggle('on',i===(lang==='ar'?0:1)));
    }
    if(prefs.unit){
      unit=prefs.unit;
      $('unitPill').querySelectorAll('button').forEach((b,i)=>b.classList.toggle('on',i===(unit==='C'?0:1)));
    }
    $('darkBtn').textContent=dark?T[lang].darkOff:T[lang].darkOn;
  }catch(e){}
  applyLang();render();
}
function save(){
  try{
    const clean=devices.filter(d=>!d.isSim).map(({bleDevice,server,loggingInterval,...r})=>r);
    localStorage.setItem('usce_devicesV5',JSON.stringify(clean));
  }catch(e){console.warn('Save error:',e);}
}
function savePrefs(){
  try{localStorage.setItem('usce_prefs',JSON.stringify({dark,lang,unit}));}catch(e){}
}


const sheetsLastSent = {};

function sendToSheets(dev, rows){
  if(!rows||!rows.length||!SHEETS_URL) return;
  const payload={
    device: dev.name||'Device',
    maxT: dev.maxT, minT: dev.minT,
    maxH: dev.maxH, minH: dev.minH,
    rows: rows.map(l=>({ts:l.ts,t:l.t,h:l.h,b:l.b||0,alarm:l.alarm||false,note:l.note||''}))
  };
  const iframeId='sheetsIframe_'+Date.now();
  const iframe=document.createElement('iframe');
  iframe.name=iframeId;iframe.style.display='none';
  document.body.appendChild(iframe);
  const form=document.createElement('form');
  form.method='POST';form.action=SHEETS_URL;
  form.target=iframeId;form.style.display='none';
  const input=document.createElement('input');
  input.type='hidden';input.name='data';input.value=JSON.stringify(payload);
  form.appendChild(input);
  document.body.appendChild(form);
  form.submit();
  setTimeout(()=>{
    try{document.body.removeChild(form);document.body.removeChild(iframe);}catch(e){}
  },5000);
  sheetsLastSent[dev.id]={time:Date.now(),count:dev.logs.length};
}

// Auto-upload: runs every 1 minute, sends only new rows since last upload
setInterval(()=>{
  devices.filter(d=>d.logs&&d.logs.length).forEach(dev=>{
    const last=sheetsLastSent[dev.id];
    const fromIdx=last?last.count:0;
    const newRows=dev.logs.slice(fromIdx);
    if(!newRows.length)return;
    sendToSheets(dev, newRows);
    // Show subtle status if device detail is open
    if(currentId===dev.id){
      const statusEl=$('sheetsStatus');
      if(statusEl){
        statusEl.classList.add('show');
        statusEl.textContent='📤 '+(lang==='ar'
          ?`رُفع تلقائياً ${newRows.length} قراءة → Sheets`
          :`Auto-uploaded ${newRows.length} new rows → Sheets`);
        setTimeout(()=>statusEl.classList.remove('show'),5000);
      }
    }
  });
}, 60 * 1000);

function timeAgo(ts){

    const temps=(d.logs||[]).map(l=>l.t).filter(v=>v!=null);
    const disp=v=>v==='--'?'--':(unit==='F'?((+v*9/5)+32).toFixed(1):v);
    const minT=temps.length?Math.min(...temps).toFixed(1):'--';
    const maxT=temps.length?Math.max(...temps).toFixed(1):'--';
    const avgT=temps.length?(temps.reduce((a,b)=>a+b,0)/temps.length).toFixed(1):'--';

    const dotCls=d.isSim?'dsim':(d.connected?(d.alarmActive&&!d.snoozed?'dalarm':d.snoozed?'dsnooze':'don'):'doff');

      <div class="data-box ${dbc}">
        <div class="big-temp" style="color:${col}">${d.temperature!=null?toDisp(d.temperature):'--'}</div>
        <div class="big-hum" style="color:#0288d1">💧 ${d.humidity!=null?Math.round(d.humidity)+'%':'--'}</div>
        <div class="bat-txt">${t.batLabel}<div class="bat-bar"><div class="bat-fill ${bcls}" style="width:${bat||0}%"></div></div>${bat!=null?bat+'%':'--'}</div>
      </div>
      ${d.alarmActive&&!d.snoozed?`<div class="alarm-hint">⚠️ ${getAlarmMsg(d)}</div>`:''}
      ${d.snoozed?`<div class="snooze-hint">🔕 ${t.snoozeMsg}</div>`:''}
      ${!d.connected&&!d.isSim?`<div class="disc-hint">⚡ ${lang==='ar'?'اضغط للاتصال':'Tap to connect'}</div>`:''}
      ${bat!=null&&bat<=20?`<div class="bat-warn">${t.batWarn}</div>`:''}
      <div class="mini-stats">
        <div class="ms"><div class="msv">${disp(minT)}${temps.length?'°'+unit:''}</div><div class="msl">${t.miniMin}</div></div>
        <div class="ms"><div class="msv">${disp(avgT)}${temps.length?'°'+unit:''}</div><div class="msl">${t.miniAvg}</div></div>
        <div class="ms"><div class="msv">${disp(maxT)}${temps.length?'°'+unit:''}</div><div class="msl">${t.miniMax}</div></div>
      </div>

  }).join('');

function getAlarmMsg(d){

// ============================================================
// BLE
// ============================================================
async function connectDevice(deviceId,bleDevice){
  const dev=devices.find(d=>d.id===deviceId);if(!dev)return;
  showLoading(T[lang].loadingConn+' '+dev.name);
  try{
    const server=await bleDevice.gatt.connect();
    dev.server=server;dev.bleDevice=bleDevice;dev.connected=true;
    bleDevice.addEventListener('gattserverdisconnected',()=>{dev.connected=false;render();});
    await startReading(deviceId);render();
  }catch(e){dev.connected=false;toast('❌ '+e.message,'err');}
  hideLoading();
}
async function startReading(deviceId){
  const dev=devices.find(d=>d.id===deviceId);if(!dev||!dev.server)return;
  try{
    const svc=await dev.server.getPrimaryService(XIAOMI);
    const th=await svc.getCharacteristic(TH);
    await th.startNotifications();
    th.addEventListener('characteristicvaluechanged',ev=>parseSensor(deviceId,ev.target.value));
    parseSensor(deviceId,await th.readValue());
    const bat=await svc.getCharacteristic(BAT);dev.battery=(await bat.readValue()).getUint8(0);
    setInterval(async()=>{if(dev.connected){try{parseSensor(deviceId,await th.readValue());dev.battery=(await bat.readValue()).getUint8(0);}catch(e){}}},5000);
  }catch(e){console.error(e);}
}
function parseSensor(deviceId,val){
  const dev=devices.find(d=>d.id===deviceId);if(!dev)return;
  dev.temperature=val.getInt16(0,true)/100;dev.humidity=val.getUint8(2);dev.lastUpdate=Date.now();
  checkAlarm(dev);render();if(currentId===deviceId&&activeTab==='live')updateLive();
}
function checkAlarm(dev){
  if(!dev.alarmEnabled){dev.alarmActive=false;dev.alarmType='';return;}
  if(dev.snoozed)return;
  const ta=dev.temperature>dev.maxT||dev.temperature<dev.minT;
  const ha=dev.humidity>dev.maxH||dev.humidity<dev.minH;
  const was=dev.alarmActive;dev.alarmActive=ta||ha;dev.alarmType=ta?'temp':(ha?'hum':'');
  if(dev.alarmActive&&!was){
    playSound(dev.sound||'beep');sendNotif(dev);
    dev.alarmHistory.unshift({ts:Date.now(),t:dev.temperature,h:dev.humidity,msg:getAlarmMsg(dev)});
    if(dev.alarmHistory.length>50)dev.alarmHistory.pop();
  }
  if(!dev.alarmActive)dev.alarmType='';
}

function playSound(type){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const g=ctx.createGain();g.connect(ctx.destination);
    function b(freq,start,dur,wave='square',vol=0.2){
      const o=ctx.createOscillator();o.connect(g);o.frequency.value=freq;o.type=wave;g.gain.value=vol;
      o.start(ctx.currentTime+start);o.stop(ctx.currentTime+start+dur);
    }
    if(type==='silent')return;
    if(type==='beep')b(900,0,.5);
    else if(type==='alarm')[0,.3,.6].forEach(t=>b(1000,t,.25,'sawtooth',.25));
    else if(type==='ping')b(1400,0,.15,'sine',.3);
    else if(type==='triple')[0,.2,.4].forEach(t=>b(800,t,.15,'square',.2));
  }catch(e){}
}
function buildSoundOptions(dev){
  const t=T[lang];$('soundLabel').textContent=t.soundLabel;
  $('soundOptions').innerHTML=SOUNDS.map(s=>
    `<button class="sound-opt ${(dev.sound||'beep')===s?'on':''}" onclick="selectSound('${s}',this)">${t.sounds[s]}</button>
     <button style="background:none;border:none;cursor:pointer;color:var(--sub);font-size:12px" onclick="playSound('${s}')">▶</button>`
  ).join('');
}
function selectSound(s,el){
  document.querySelectorAll('.sound-opt').forEach(b=>b.classList.remove('on'));el.classList.add('on');
  const dev=devices.find(d=>d.id===currentId);if(dev)dev.sound=s;
}

function snooze(minutes){
  const dev=devices.find(d=>d.id===currentId);if(!dev)return;
  dev.snoozed=true;dev.alarmActive=false;dev.alarmType='';
  const ms=minutes*60*1000;let remaining=ms;
  if(snoozeTimers[currentId]){clearTimeout(snoozeTimers[currentId].timer);clearInterval(snoozeTimers[currentId].interval);}
  const timer=setTimeout(()=>{dev.snoozed=false;clearInterval(snoozeTimers[currentId]?.interval);delete snoozeTimers[currentId];render();if(currentId===dev.id)updateLive();},ms);
  const interval=setInterval(()=>{
    remaining-=1000;const el=$('snoozeCount');
    if(el){const m=Math.floor(remaining/60000),s=Math.floor((remaining%60000)/1000);el.textContent=`${m}:${s.toString().padStart(2,'0')}`;}
    if(remaining<=0)clearInterval(interval);
  },1000);
  snoozeTimers[currentId]={timer,interval};
  toast(T[lang].toastSnoozed,'info');render();updateLive();
}
function cancelSnooze(){
  const dev=devices.find(d=>d.id===currentId);if(!dev)return;
  dev.snoozed=false;
  if(snoozeTimers[currentId]){clearTimeout(snoozeTimers[currentId].timer);clearInterval(snoozeTimers[currentId].interval);delete snoozeTimers[currentId];}

function setChartRange(r){chartRange=r;buildCharts();if($('fullChartModal').classList.contains('show'))buildFullCharts();}
function gc(){return dark?'rgba(255,255,255,.08)':'rgba(0,0,0,.07)';}
function tc2(){return dark?'#ccc':'#555';}

/**
 * Build chart with UCL/LCL limit lines (CPK style)
 * @param {string} canvasId  - canvas element id
 * @param {object} existing  - existing Chart instance (will be destroyed)
 * @param {number[]} data    - main data array
 * @param {string[]} labels  - x-axis labels
 * @param {string} lbl       - dataset label
 * @param {string} color     - main line color
 * @param {number} maxLimit  - upper control limit value
 * @param {number} minLimit  - lower control limit value
 * @param {string} maxColor  - UCL line color
 * @param {string} minColor  - LCL line color
 * @param {string} limitUnit - unit suffix for limit labels
 */
function mkChartWithLimits(canvasId, existing, data, labels, lbl, color, maxLimit, minLimit, maxColor, minColor, limitUnit){
  if(existing)existing.destroy();

  const maxLabel = `UCL ${toLimitDisp(maxLimit)}${limitUnit}`;
  const minLabel = `LCL ${toLimitDisp(minLimit)}${limitUnit}`;

  // Fill arrays with constant limit values matching data length
  const maxArr = data.map(()=>maxLimit);
  const minArr = data.map(()=>minLimit);

  return new Chart($(canvasId).getContext('2d'),{
    type:'line',
    data:{
      labels,
      datasets:[
        // Main data line
        {
          label: lbl,
          data,
          borderColor: color,
          backgroundColor: color+'18',
          tension:.35,
          pointRadius: data.length > 60 ? 0 : 2,
          fill: true,
          order: 3
        },
        // UCL — Max limit (red/pink)
        {
          label: maxLabel,
          data: maxArr,
          borderColor: maxColor,
          backgroundColor: 'transparent',
          borderWidth: 2,
          borderDash: [8, 4],
          pointRadius: 0,
          fill: false,
          tension: 0,
          order: 1
        },
        // LCL — Min limit (blue/cyan)
        {
          label: minLabel,
          data: minArr,
          borderColor: minColor,
          backgroundColor: minColor+'18',
          borderWidth: 2,
          borderDash: [8, 4],
          pointRadius: 0,
          fill: '-1',   // fill between LCL and UCL
          tension: 0,
          order: 2
        }
      ]
    },
    options:{
      responsive:true,
      maintainAspectRatio:false,
      animation:false,
      interaction:{mode:'index',intersect:false},
      plugins:{
        legend:{
          labels:{
            color: tc2(),
            usePointStyle: true,
            pointStyle: 'line',
            font:{size:11}
          }
        },
        tooltip:{
          callbacks:{
            afterBody(ctx){
              const v = ctx[0]?.parsed?.y;
              if(v==null)return '';
              if(v > maxLimit) return '⚠️ Above UCL';
              if(v < minLimit) return '⚠️ Below LCL';
              return '✅ In Range';
            }
          }
        }
      },
      scales:{
        x:{ticks:{color:tc2(),maxTicksLimit:8},grid:{color:gc()}},
        y:{ticks:{color:tc2()},grid:{color:gc()},
          // Auto-expand y axis to show limits with margin
          suggestedMin: Math.min(minLimit, ...(data.filter(v=>v!=null))) - 2,
          suggestedMax: Math.max(maxLimit, ...(data.filter(v=>v!=null))) + 2
        }
      }
    }
  });
}

function buildCharts(){
  const dev=devices.find(d=>d.id===currentId);if(!dev)return;
  const t=T[lang];
  let logs=dev.logs||[];if(chartRange>0)logs=logs.slice(-chartRange);
  const labels=logs.map(l=>new Date(l.ts).toLocaleTimeString());

  // Convert limits if Fahrenheit
  const maxTL = unit==='F'?(dev.maxT*9/5+32):dev.maxT;
  const minTL = unit==='F'?(dev.minT*9/5+32):dev.minT;
  const tUnit = '°'+(unit==='C'?'C':'F');

  cTI=mkChartWithLimits(
    'cTemp', cTI,
    logs.map(l=>l.t!=null?(unit==='F'?+(l.t*9/5+32).toFixed(2):l.t):null),
    labels, t.chartTempLabel, '#1976d2',
    maxTL, minTL, '#f44336', '#2196F3', tUnit
  );

  cHI=mkChartWithLimits(
    'cHum', cHI,
    logs.map(l=>l.h),
    labels, t.chartHumLabel, '#388e3c',
    dev.maxH, dev.minH, '#e91e63', '#00bcd4', '%'
  );

  // Update legend labels
  $('llMaxT').textContent=`UCL ${toLimitDisp(maxTL)}${tUnit}`;
  $('llMinT').textContent=`LCL ${toLimitDisp(minTL)}${tUnit}`;
  $('llTempLine').textContent=t.chartTempLabel;
  $('llMaxH').textContent=`UCL ${dev.maxH}%`;
  $('llMinH').textContent=`LCL ${dev.minH}%`;
  $('llHumLine').textContent=t.chartHumLabel;
}

  const labels=logs.map(l=>new Date(l.ts).toLocaleTimeString());

  fcTI=mkChartWithLimits(

function exportChartPNG(full=false){
  const c1=$(full?'fcTemp':'cTemp');
  const c2=$(full?'fcHum':'cHum');
  if(!c1||!c2)return;
  const dev=devices.find(d=>d.id===currentId);
  const name=dev?dev.name:'Device';

  // Merge both canvases vertically into one PNG
  const gap=20, titleH=36, padding=16;
  const w=Math.max(c1.width,c2.width)+padding*2;
  const h=titleH+c1.height+gap+c2.height+padding*2;

  const merged=document.createElement('canvas');
  merged.width=w;merged.height=h;
  const ctx=merged.getContext('2d');

  // Background
  ctx.fillStyle=dark?'#1e1e2e':'#ffffff';
  ctx.fillRect(0,0,w,h);

  // Title
  ctx.fillStyle=dark?'#e0e0e0':'#333333';
  ctx.font='bold 15px Segoe UI, sans-serif';
  ctx.textAlign='center';
  ctx.fillText('📊 '+name+' — '+new Date().toLocaleString(),w/2,padding+18);

  // Draw temp chart
  ctx.drawImage(c1,padding,titleH+padding);

  // Draw hum chart
  ctx.drawImage(c2,padding,titleH+padding+c1.height+gap);

  // Limits bar
  if(dev){
    ctx.font='11px Segoe UI, sans-serif';
    ctx.textAlign='left';
    ctx.fillStyle='#f44336';ctx.fillText(`UCL T: ${dev.maxT}°C`,padding,titleH+padding+c1.height+gap/2);
    ctx.fillStyle='#2196F3';ctx.fillText(`LCL T: ${dev.minT}°C`,padding+90,titleH+padding+c1.height+gap/2);
    ctx.fillStyle='#e91e63';ctx.fillText(`UCL H: ${dev.maxH}%`,padding+180,titleH+padding+c1.height+gap/2);
    ctx.fillStyle='#00bcd4';ctx.fillText(`LCL H: ${dev.minH}%`,padding+260,titleH+padding+c1.height+gap/2);
  }

  const a=document.createElement('a');
  a.download=(name+'_chart.png').replace(/\s+/g,'_');
  a.href=merged.toDataURL('image/png');
  a.click();
}

  if(dateStr)logs=logs.filter(l=>new Date(l.ts).toISOString().startsWith(dateStr));
  if(search)logs=logs.filter(l=>new Date(l.ts).toLocaleString().toLowerCase().includes(search)||String(l.t).includes(search)||((l.note||'').toLowerCase().includes(search)));

function openBackup(){
  const t=T[lang];$('backupTitle').textContent=t.backupTitle;$('exportBackupBtn').textContent=t.exportBackupBtn;
  $('importBackupBtn').textContent=t.importBackupBtn;$('backupDropMsg').textContent=t.backupDropMsg;
  $('backupModal').style.display='block';
}
function closeBackup(){$('backupModal').style.display='none';}
function doExportBackup(){
  const clean=devices.filter(d=>!d.isSim).map(({bleDevice,server,loggingInterval,...r})=>r);
  dl(JSON.stringify({version:4,exported:new Date().toISOString(),devices:clean},null,2),'application/json',`usce_backup_${Date.now()}.json`);
  toast(T[lang].toastExported,'ok');
}
async function doImportBackup(e){
  const file=e.target.files[0];if(!file)return;
  try{
    const text=await file.text();const data=JSON.parse(text);
    if(!data.devices||!Array.isArray(data.devices))throw new Error('invalid');
    const simDevs=devices.filter(d=>d.isSim);
    devices=[...simDevs,...data.devices.map(d=>({...d,connected:false,bleDevice:null,server:null,alarmActive:d.alarmActive||false,alarmType:d.alarmType||'',snoozed:false,logs:d.logs||[],alarmHistory:d.alarmHistory||[],sound:d.sound||'beep'}))];
    save();render();applyLang();closeBackup();toast(T[lang].toastImported,'ok');
  }catch(err){toast(T[lang].toastImportErr,'err');}
  e.target.value='';
}
const dz=$('backupDropZone');
dz.addEventListener('dragover',e=>{e.preventDefault();dz.style.borderColor='#667eea';});
dz.addEventListener('dragleave',()=>{dz.style.borderColor='';});
dz.addEventListener('drop',e=>{e.preventDefault();dz.style.borderColor='';const f=e.dataTransfer.files[0];if(f)doImportBackup({target:{files:[f],value:''}});});

// ============================================================
// INIT
// ============================================================
loadDevices();
requestNotifPerm();
// Re-render time-ago labels every 30s
setInterval(()=>{if(devices.length)render();},30000);
// Auto-save every 30 seconds (catches any unsaved log entries)
setInterval(()=>save(),30000);
</script>
</body>
</html>
